<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Admin — Quản lý kiểu tóc</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f4f4; color: #222; }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 32px;
      font-size: 20px;
      font-weight: bold;
    }

    .container { max-width: 1100px; margin: 32px auto; padding: 0 16px; }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
    }

    h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #1a1a2e; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; }

    label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }

    input[type="text"], input[type="number"], input[type="file"] {
      width: 100%; padding: 8px 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 14px; margin-bottom: 12px;
    }

    button {
      padding: 9px 20px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: 600;
    }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #2d2d5e; }
    .btn-danger  { background: #e74c3c; color: #fff; }
    .btn-danger:hover  { background: #c0392b; }
    .btn-warning { background: #f39c12; color: #fff; }
    .btn-warning:hover { background: #d68910; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: 8px; color: #fff;
      font-size: 14px; display: none; z-index: 999;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
    }
    .toast.success { background: #27ae60; }
    .toast.error   { background: #e74c3c; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #1a1a2e; color: #fff; padding: 10px 12px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr:hover td { background: #fafafa; }

    .hair-thumb {
      width: 60px; height: 60px; object-fit: contain;
      background: #f0f0f0; border-radius: 6px; border: 1px solid #ddd;
    }

    .actions { display: flex; gap: 8px; }

    .form-row { display: flex; gap: 16px; }
    .form-row > div { flex: 1; }

    #loadingOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 1000;
      align-items: center; justify-content: center;
    }
    #loadingOverlay.show { display: flex; }
    .spinner {
      width: 48px; height: 48px; border: 5px solid #fff3;
      border-top-color: #fff; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-row td { text-align: center; color: #aaa; padding: 24px; }
  </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>

<header>Admin — Quản lý kiểu tóc</header>

<div class="container">

  <!-- UPLOAD -->
  <div class="card">
    <h2>Thêm kiểu tóc mới</h2>
    <div class="form-row">
      <div>
        <label>Tên kiểu tóc</label>
        <input type="text" id="uploadName" placeholder="VD: Tóc bob ngắn" />
      </div>
      <div>
        <label>Ảnh kiểu tóc</label>
        <input type="file" id="uploadImage" accept="image/*" />
      </div>
    </div>
    <button class="btn-primary" onclick="uploadHairstyle()">Upload & tách tóc</button>
  </div>

  <!-- LIST -->
  <div class="card">
    <h2 style="display:flex;justify-content:space-between;align-items:center">
      Danh sách kiểu tóc
      <button class="btn-primary" style="font-size:12px;padding:6px 14px" onclick="loadHairstyles()">Tải lại</button>
    </h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Ảnh tóc đã tách</th>
          <th>Tên</th>
          <th>Đường dẫn file</th>
          <th>Ngày tạo</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="hairstyleTable">
        <tr class="empty-row"><td colspan="6">Đang tải...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- UPDATE -->
  <div class="card">
    <h2>Cập nhật kiểu tóc</h2>
    <div class="form-row">
      <div>
        <label>ID kiểu tóc</label>
        <input type="number" id="updateId" placeholder="Nhập ID" />
      </div>
      <div>
        <label>Tên mới (bỏ trống để giữ nguyên)</label>
        <input type="text" id="updateName" placeholder="Tên mới" />
      </div>
    </div>
    <label>Ảnh mới (bỏ trống để giữ nguyên)</label>
    <input type="file" id="updateImage" accept="image/*" />
    <button class="btn-warning" onclick="updateHairstyle()">Cập nhật</button>
  </div>

</div>

<script>
  const BASE = "http://localhost:8000";

  // ── Toast ──────────────────────────────────────────────────────────────────
  function toast(msg, type = "success") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = `toast ${type}`;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3000);
  }

  // ── Loading overlay ────────────────────────────────────────────────────────
  function setLoading(show) {
    document.getElementById("loadingOverlay").classList.toggle("show", show);
  }

  // ── Load danh sách ─────────────────────────────────────────────────────────
  async function loadHairstyles() {
    try {
      const res = await fetch(`${BASE}/admin/hairstyles`);
      const data = await res.json();
      const tbody = document.getElementById("hairstyleTable");

      if (!data.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Chưa có kiểu tóc nào</td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(h => {
        const imgUrl = `${BASE}/${h.image_path.replace(/\\/g, "/")}`;
        const date = h.created_at ? h.created_at.split(".")[0] : "—";
        return `
          <tr>
            <td>${h.id}</td>
            <td><img src="${imgUrl}" class="hair-thumb" onerror="this.style.display='none'" /></td>
            <td>${h.name}</td>
            <td style="font-size:12px;color:#888">${h.image_path}</td>
            <td style="font-size:12px">${date}</td>
            <td>
              <div class="actions">
                <button class="btn-warning" style="font-size:12px;padding:5px 12px"
                  onclick="prefillUpdate(${h.id}, '${h.name}')">Sửa</button>
                <button class="btn-danger" style="font-size:12px;padding:5px 12px"
                  onclick="deleteHairstyle(${h.id})">Xoá</button>
              </div>
            </td>
          </tr>`;
      }).join("");
    } catch (e) {
      toast("Không thể kết nối backend", "error");
    }
  }

  // ── Upload ─────────────────────────────────────────────────────────────────
  async function uploadHairstyle() {
    const name  = document.getElementById("uploadName").value.trim();
    const file  = document.getElementById("uploadImage").files[0];

    if (!name) return toast("Nhập tên kiểu tóc", "error");
    if (!file) return toast("Chọn ảnh kiểu tóc", "error");

    const form = new FormData();
    form.append("name", name);
    form.append("image", file);

    setLoading(true);
    try {
      const res = await fetch(`${BASE}/admin/upload-hairstyle`, { method: "POST", body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Lỗi server");

      toast(`Đã thêm kiểu tóc ID=${data.id}`);
      document.getElementById("uploadName").value = "";
      document.getElementById("uploadImage").value = "";
      loadHairstyles();
    } catch (e) {
      toast(e.message, "error");
    } finally {
      setLoading(false);
    }
  }

  // ── Update ─────────────────────────────────────────────────────────────────
  function prefillUpdate(id, name) {
    document.getElementById("updateId").value = id;
    document.getElementById("updateName").value = name;
    document.getElementById("updateId").scrollIntoView({ behavior: "smooth" });
  }

  async function updateHairstyle() {
    const id   = document.getElementById("updateId").value.trim();
    const name = document.getElementById("updateName").value.trim();
    const file = document.getElementById("updateImage").files[0];

    if (!id) return toast("Nhập ID kiểu tóc", "error");
    if (!name && !file) return toast("Nhập tên mới hoặc chọn ảnh mới", "error");

    const form = new FormData();
    if (name) form.append("name", name);
    if (file) form.append("image", file);

    setLoading(true);
    try {
      const res = await fetch(`${BASE}/admin/hairstyles/${id}`, { method: "PUT", body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Lỗi server");

      toast(`Đã cập nhật kiểu tóc ID=${id}`);
      document.getElementById("updateId").value = "";
      document.getElementById("updateName").value = "";
      document.getElementById("updateImage").value = "";
      loadHairstyles();
    } catch (e) {
      toast(e.message, "error");
    } finally {
      setLoading(false);
    }
  }

  // ── Delete ─────────────────────────────────────────────────────────────────
  async function deleteHairstyle(id) {
    if (!confirm(`Xoá kiểu tóc ID=${id}?`)) return;

    try {
      const res = await fetch(`${BASE}/admin/hairstyles/${id}`, { method: "DELETE" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Lỗi server");
      toast(data.message);
      loadHairstyles();
    } catch (e) {
      toast(e.message, "error");
    }
  }

  // ── Try-On ────────────────────────────────────────────────────────────────
  function previewPerson(input) {
    const file = input.files[0];
    if (!file) return;
    const el = document.getElementById("tryonPersonPreview");
    el.src = URL.createObjectURL(file);
    el.style.display = "block";
  }

  async function runTryon() {
    const file = document.getElementById("tryonPerson").files[0];
    const id   = document.getElementById("tryonHairstyleId").value.trim();

    if (!file) return toast("Chọn ảnh người dùng", "error");
    if (!id)   return toast("Nhập ID kiểu tóc", "error");

    const form = new FormData();
    form.append("person_image", file);
    form.append("hairstyle_id", id);

    setLoading(true);
    try {
      const res = await fetch(`${BASE}/tryon`, { method: "POST", body: form });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "Lỗi server");
      }
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);

      document.getElementById("tryonResultImg").src     = url;
      document.getElementById("tryonDownload").href     = url;
      document.getElementById("tryonResult").style.display = "block";
      toast("Ghép tóc thành công!");
    } catch (e) {
      toast(e.message, "error");
    } finally {
      setLoading(false);
    }
  }

  // Load khi mở trang
  loadHairstyles();
</script>
</body>
</html>
