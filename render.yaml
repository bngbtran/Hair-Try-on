services:
  - type: web
    name: hair-tryon-api
    runtime: python
    plan: standard          # 2GB RAM — cần cho MediaPipe + OpenCV
    region: singapore
    rootDir: backend
    buildCommand: apt-get update -y && apt-get install -y --no-install-recommends libgles2 libegl1 libgl1 libglib2.0-0 && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    disk:
      name: hair-tryon-data
      mountPath: /data
      sizeGB: 2

    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/hairstyle.db
      - key: ASSETS_DIR
        value: /data/assets
      - key: MODELS_DIR
        value: /data/models
      - key: MEDIAPIPE_DISABLE_GPU
        value: "1"
      - key: LIBGL_ALWAYS_SOFTWARE
        value: "1"
