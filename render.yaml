services:
  - type: web
    name: hair-tryon-api
    runtime: python
    plan: standard
    region: singapore
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: LD_LIBRARY_PATH=/opt/render/project/src/backend/libs:$LD_LIBRARY_PATH uvicorn app.main:app --host 0.0.0.0 --port $PORT

    disk:
      name: hair-tryon-data
      mountPath: /data
      sizeGB: 2

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        value: sqlite:////data/hairstyle.db
      - key: ASSETS_DIR
        value: /data/assets
      - key: MODELS_DIR
        value: /data/models
      - key: MEDIAPIPE_DISABLE_GPU
        value: "1"
      - key: LIBGL_ALWAYS_SOFTWARE
        value: "1"
