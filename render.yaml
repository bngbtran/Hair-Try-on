services:
  - type: web
    name: hair-tryon-api
    runtime: python
    plan: standard          # 2GB RAM — cần cho MediaPipe + OpenCV
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    disk:
      name: hair-tryon-data
      mountPath: /data
      sizeGB: 2

    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/hairstyle.db
      - key: ASSETS_DIR
        value: /data/assets
      - key: MODELS_DIR
        value: /data/models
